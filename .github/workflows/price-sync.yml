name: Price Sync

# Every 30 minutes, on the hour and half-hour — calls our deployed
# /api/prices/sync endpoint. Requires two repository secrets (Settings →
# Secrets and variables → Actions → Repository secrets — NOT Environment
# secrets, which this workflow can't see):
#   APP_URL      — e.g. https://www.project-vaal.xyz  (no trailing slash)
#   CRON_SECRET  — same value as the CRON_SECRET env var in Vercel

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

jobs:
  sync-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Verify secrets are present
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "::error::APP_URL secret is missing or not visible to this workflow (check Settings → Secrets and variables → Actions → Repository secrets, not an Environment)."
            exit 1
          fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "::error::CRON_SECRET secret is missing or not visible to this workflow."
            exit 1
          fi

      - name: Call price sync endpoint
        run: |
          status=$(curl -sL -o response.json -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/prices/sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "HTTP status: $status"
          cat response.json
          if [ "$status" -ne 200 ]; then
            echo "Price sync failed"
            exit 1
          fi
